[brand]
tagline = "ML · S&P 500 · Transformer"

[[sections]]
id = "features"
type = "features"
title = "Features"
icon = "grid"

[[sections.items]]
title = "Encoder-Only Transformer"
body = "Full bidirectional attention — every stock attends to every other stock. Research shows this architecture captures cross-stock relationships effectively. ~478K parameters."

[[sections.items]]
title = "Multi-Window Features"
body = "30 technical indicators (SMA, RSI, MACD, Bollinger, volatility, returns, drawdown) at 1y, 1m, 1w, 1d lookbacks — 120 features per stock per day. Crypto pipeline uses BTC/USD as market proxy."

[[sections.items]]
title = "Portfolio-Aware Training"
body = "From MSE to MSRR (direct Sharpe optimization), margin ranking, and ListNet losses. MSRR optimizes portfolio weights, not individual stock errors."

[[sections.items]]
title = "Market-Guided Gating"
body = "SPY state (returns, volatility, volume) rescales features before the transformer. The model adapts to bull/bear/high-volatility regimes automatically."

